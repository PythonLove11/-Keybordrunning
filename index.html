<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>きいぼおどらんにんぐ</title>
<meta name="description" content="きいぼおどらんにんぐのゲーム解説サイト。操作方法やjqentyの説明を紹介しています。">
<meta name="keywords" content="きいぼおどらんにんぐ, キーボードゲーム, jqenty, ブラウザゲーム">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ドット風フォント -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Press Start 2P', cursive; /* ドット風フォント */
    background:#f4f6fb;
    scroll-behavior:smooth; /* 滑らかスクロール */
}

/* ヘッダー */
header{
    position:fixed;
    top:0;
    width:100%;
    background:#34495e;
    color:white;
    z-index:1000;
}

/* ヘッダー内 */
.header-container{
    display:flex;
    align-items:center;
    justify-content:center;
    height:60px;
    position:relative;
    padding-left:80px; /* タイトルと三本線の間隔 */
}

/* タイトル */
header h1{
    margin:0;
    font-size:26px;
}

/* ハンバーガーメニュー */
.menu-button{
    position:absolute;
    left:20px;
    width:30px;
    height:24px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.menu-button span{
    display:block;
    height:4px;
    background:white;
    border-radius:2px;
    transition:0.3s;
}

/* アニメーション */
.menu-button.active span:nth-child(1){
    transform:rotate(45deg) translate(6px,6px);
}

.menu-button.active span:nth-child(2){
    opacity:0;
}

.menu-button.active span:nth-child(3){
    transform:rotate(-45deg) translate(6px,-6px);
}

/* メニュー（左スライド） */
nav{
    position:fixed;
    top:0;
    left:-200px; /* 初期は画面外 */
    width:200px;
    height:100%;
    background:#2c3e50;
    overflow-y:auto;
    transition:left 0.3s ease;
    z-index:999;
}

nav.open{
    left:0;
}

nav a{
    display:block;
    padding:14px;
    text-align:center;
    color:white;
    text-decoration:none;
}

nav a:hover{
    background:#3b5870;
}

/* 本文 */
main{
    max-width:900px;
    margin:auto;
    padding:100px 30px 30px 30px;
}

section{
    background:white;
    padding:20px;
    margin-bottom:25px;
    border-radius:8px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* フッター */
footer{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
    font-size:14px;
}

/* スマホ対応 */
@media screen and (max-width:600px){
    header h1{
        font-size:22px;
    }
    .header-container{
        padding-left:60px;
    }
    nav{
        width:160px;
    }
}
</style>
</head>

<body>

<header>
<div class="header-container">
    <div class="menu-button" id="menu-btn">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <h1>きいぼおどらんにんぐ</h1>
</div>

<nav id="menu">
    <a href="#about" class="menu-link">ゲームとは</a>
    <a href="#controls" class="menu-link">操作方法</a>
    <a href="#jqenty" class="menu-link">jqenty</a>
</nav>
</header>

<main>
<section id="about">
<h2>ゲームとは？</h2>
<p>
「きいぼおどらんにんぐ」はキーボード入力でキャラクターを走らせるゲームです。
素早くキーを入力して障害物を避けながら進みます。
</p>
</section>

<section id="controls">
<h2>操作方法</h2>
<ul>
<li>Aキー：左へ移動</li>
<li>Dキー：右へ移動</li>
<li>スペース：ジャンプ</li>
</ul>
</section>

<section id="jqenty">
<h2>jqentyとは？</h2>
<p>
jqentyはJavaScriptを簡単に扱うためのライブラリです。
イベント処理や画面操作を簡単に実装できます。
</p>
</section>
</main>

<footer>
© 2026 Yuki Ando / きいぼおどらんにんぐ 解説サイト
</footer>

<script>
const menuBtn = document.getElementById('menu-btn');
const menu = document.getElementById('menu');
const menuLinks = document.querySelectorAll('.menu-link');

// ハンバーガー押したら開閉
menuBtn.addEventListener('click', (e)=>{
    e.stopPropagation(); // イベントがbodyに伝播しないようにする
    menu.classList.toggle('open');
    menuBtn.classList.toggle('active');
});

// メニュー項目クリックでスクロール＆閉じる
menuLinks.forEach(link => {
    link.addEventListener('click', ()=>{
        menu.classList.remove('open');
        menuBtn.classList.remove('active');
    });
});

// メニュー開いているとき、タブ以外クリックで閉じる
document.addEventListener('click', (e)=>{
    if(menu.classList.contains('open')){
        if(!menu.contains(e.target) && e.target !== menuBtn){
            menu.classList.remove('open');
            menuBtn.classList.remove('active');
        }
    }
});
</script>

</body>
</html>
